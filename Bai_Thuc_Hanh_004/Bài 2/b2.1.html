<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Bài 2.1 - Form Đăng Ký</title>
</head>
<body>

  <h2>Form Đăng Ký Tài Khoản</h2>

  <form id="registerForm">
    <div>
      <label>Họ và tên:</label><br>
      <input type="text" id="fullname">
      <div id="fullnameError"></div>
    </div>

    <br>

    <div>
      <label>Email:</label><br>
      <input type="text" id="email">
      <div id="emailError"></div>
    </div>

    <br>

    <div>
      <label>Số điện thoại:</label><br>
      <input type="text" id="phone">
      <div id="phoneError"></div>
    </div>

    <br>

    <div>
      <label>Mật khẩu:</label><br>
      <input type="password" id="password">
      <div id="passwordError"></div>
    </div>

    <br>

    <div>
      <label>Xác nhận mật khẩu:</label><br>
      <input type="password" id="confirmPassword">
      <div id="confirmPasswordError"></div>
    </div>

    <br>

    <div>
      <label>Giới tính:</label><br>
      <input type="radio" name="gender" value="Nam"> Nam
      <input type="radio" name="gender" value="Nữ"> Nữ
      <input type="radio" name="gender" value="Khác"> Khác
      <div id="genderError"></div>
    </div>

    <br>

    <div>
      <input type="checkbox" id="terms">
      <label for="terms">Tôi đồng ý với điều khoản</label>
      <div id="termsError"></div>
    </div>

    <br>

    <button type="submit">Đăng ký</button>
  </form>

  <div id="successMessage" style="display:none;"></div>

  <script>
    const form = document.getElementById("registerForm");

    const fullname = document.getElementById("fullname");
    const email = document.getElementById("email");
    const phone = document.getElementById("phone");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");
    const terms = document.getElementById("terms");
    const successMessage = document.getElementById("successMessage");

    function showError(fieldId, message) {
      document.getElementById(fieldId + "Error").textContent = message;
    }

    function clearError(fieldId) {
      document.getElementById(fieldId + "Error").textContent = "";
    }

    function validateFullname() {
      const value = fullname.value.trim();
      const regex = /^[A-Za-zÀ-ỹ\s]+$/;

      if (value === "") {
        showError("fullname", "Họ và tên không được để trống");
        return false;
      }

      if (value.length < 3) {
        showError("fullname", "Họ và tên phải có ít nhất 3 ký tự");
        return false;
      }

      if (!regex.test(value)) {
        showError("fullname", "Họ và tên chỉ được chứa chữ cái và khoảng trắng");
        return false;
      }

      clearError("fullname");
      return true;
    }

    function validateEmail() {
      const value = email.value.trim();
      const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (value === "") {
        showError("email", "Email không được để trống");
        return false;
      }

      if (!regex.test(value)) {
        showError("email", "Email không đúng định dạng");
        return false;
      }

      clearError("email");
      return true;
    }

    function validatePhone() {
      const value = phone.value.trim();
      const regex = /^0\d{9}$/;

      if (value === "") {
        showError("phone", "Số điện thoại không được để trống");
        return false;
      }

      if (!regex.test(value)) {
        showError("phone", "Số điện thoại phải có 10 chữ số và bắt đầu bằng 0");
        return false;
      }

      clearError("phone");
      return true;
    }

    function validatePassword() {
      const value = password.value;
      const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

      if (value === "") {
        showError("password", "Mật khẩu không được để trống");
        return false;
      }

      if (!regex.test(value)) {
        showError("password", "Mật khẩu phải có ít nhất 8 ký tự, gồm chữ hoa, chữ thường và số");
        return false;
      }

      clearError("password");
      return true;
    }

    function validateConfirmPassword() {
      const value = confirmPassword.value;

      if (value === "") {
        showError("confirmPassword", "Vui lòng xác nhận mật khẩu");
        return false;
      }

      if (value !== password.value) {
        showError("confirmPassword", "Xác nhận mật khẩu không khớp");
        return false;
      }

      clearError("confirmPassword");
      return true;
    }

    function validateGender() {
      const gender = document.querySelector('input[name="gender"]:checked');

      if (!gender) {
        showError("gender", "Vui lòng chọn giới tính");
        return false;
      }

      clearError("gender");
      return true;
    }

    function validateTerms() {
      if (!terms.checked) {
        showError("terms", "Bạn phải đồng ý với điều khoản");
        return false;
      }

      clearError("terms");
      return true;
    }

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      const isValid =
        validateFullname() &
        validateEmail() &
        validatePhone() &
        validatePassword() &
        validateConfirmPassword() &
        validateGender() &
        validateTerms();

      if (isValid) {
        form.style.display = "none";
        successMessage.style.display = "block";
        successMessage.innerHTML = "Đăng ký thành công! 🎉<br>Xin chào, " + fullname.value.trim();
      }
    });

    fullname.addEventListener("blur", validateFullname);
    email.addEventListener("blur", validateEmail);
    phone.addEventListener("blur", validatePhone);
    password.addEventListener("blur", validatePassword);
    confirmPassword.addEventListener("blur", validateConfirmPassword);

    fullname.addEventListener("input", function() {
      clearError("fullname");
    });

    email.addEventListener("input", function() {
      clearError("email");
    });

    phone.addEventListener("input", function() {
      clearError("phone");
    });

    password.addEventListener("input", function() {
      clearError("password");
    });

    confirmPassword.addEventListener("input", function() {
      clearError("confirmPassword");
    });

    const genderRadios = document.querySelectorAll('input[name="gender"]');
    genderRadios.forEach(function(radio) {
      radio.addEventListener("change", function() {
        clearError("gender");
      });
    });

    terms.addEventListener("change", function() {
      clearError("terms");
    });
  </script>

</body>
</html>
